<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crosspost Helper</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px; font-family: system-ui, -apple-system, sans-serif;
      background: #0f0f13; color: #e8e8f0; font-size: 13px;
    }
    .header {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 14px; border-bottom: 1px solid #1e1e2e;
    }
    .header h1 { font-size: 13px; font-weight: 700; color: #c8c8e0; flex: 1; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%; background: #3f3f5a;
      transition: background 0.3s;
    }
    .status-dot.connected { background: #22c55e; box-shadow: 0 0 6px #22c55e88; }
    .status-dot.error { background: #ef4444; }

    .body { padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; }

    .platform-badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: #1e1e2e; border: 1px solid #2a2a3e;
      border-radius: 6px; padding: 4px 9px; font-size: 12px; font-weight: 600;
      color: #8888b0;
    }
    .platform-badge.active { color: #a5b4fc; border-color: #4f4fa0; }

    .image-info {
      background: #1a1a28; border: 1px solid #2a2a3e; border-radius: 8px;
      padding: 9px 11px; font-size: 12px; color: #9090b8; min-height: 36px;
    }
    .image-info .filename { color: #d0d0f0; font-weight: 600; margin-bottom: 2px; word-break: break-all; }
    .image-info .hint { font-size: 11px; color: #5a5a7a; }

    .btn {
      width: 100%; padding: 9px 14px; border-radius: 8px; border: none;
      font-size: 13px; font-weight: 700; cursor: pointer; transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: #6366f1; color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #5253cc; }
    .btn-success { background: #16a34a; color: #fff; }
    .btn-success:hover:not(:disabled) { background: #15803d; }

    .msg { font-size: 11px; text-align: center; color: #5a5a7a; padding: 2px 0; }
    .msg.error { color: #f87171; }
    .msg.success { color: #4ade80; }

    #mark-section { display: none; flex-direction: column; gap: 8px;
      border-top: 1px solid #1e1e2e; padding-top: 10px; }
    #mark-section.visible { display: flex; }

    .settings-row {
      display: flex; align-items: center; justify-content: space-between;
      border-top: 1px solid #1e1e2e; padding-top: 10px;
      font-size: 11px; color: #6060880;
    }
    .settings-row label { color: #7070a0; cursor: pointer; user-select: none; }
    .toggle {
      position: relative; width: 32px; height: 18px; flex-shrink: 0;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-track {
      position: absolute; inset: 0; border-radius: 9px;
      background: #2a2a3e; cursor: pointer; transition: background 0.2s;
    }
    .toggle-track::after {
      content: ""; position: absolute; top: 3px; left: 3px;
      width: 12px; height: 12px; border-radius: 50%;
      background: #5a5a7a; transition: transform 0.2s, background 0.2s;
    }
    .toggle input:checked + .toggle-track { background: #6366f1; }
    .toggle input:checked + .toggle-track::after {
      transform: translateX(14px); background: #fff;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Crosspost Helper</h1>
    <span id="status-dot" class="status-dot" title="Connecting…"></span>
  </div>

  <div class="body">
    <div id="platform-badge" class="platform-badge">— not a supported page —</div>

    <div id="image-info" class="image-info">
      <div class="hint">Connecting to app…</div>
    </div>

    <button id="inject-btn" class="btn btn-primary" disabled>Inject images</button>
    <div id="msg" class="msg"></div>

    <div id="mark-section">
      <button id="mark-btn" class="btn btn-success">✓ Mark as Posted</button>
    </div>

    <div class="settings-row">
      <label for="auto-post-toggle">Auto-post after inject</label>
      <label class="toggle">
        <input type="checkbox" id="auto-post-toggle" />
        <span class="toggle-track"></span>
      </label>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
