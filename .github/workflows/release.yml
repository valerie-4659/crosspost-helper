name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macOS
            os: macos-latest
            artifact: macos
          - name: Windows
            os: windows-latest
            artifact: windows
          - name: Linux
            os: ubuntu-22.04
            artifact: linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri bundles
        run: npm run tauri -- build --no-sign

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p "dist/release/${{ matrix.platform.artifact }}"
          find src-tauri/target/release/bundle -type f \( \
            -name "*.dmg" -o \
            -name "*.msi" -o \
            -name "*.exe" -o \
            -name "*.AppImage" -o \
            -name "*.deb" -o \
            -name "*.rpm" \
          \) -print -exec cp {} "dist/release/${{ matrix.platform.artifact }}/" \;
          if [ "${{ runner.os }}" = "macOS" ] && [ -d "src-tauri/target/release/bundle/macos/Crosspost Helper.app" ]; then
            ditto -c -k --keepParent "src-tauri/target/release/bundle/macos/Crosspost Helper.app" "dist/release/${{ matrix.platform.artifact }}/Crosspost-Helper-${GITHUB_REF_NAME}-macos-unsigned.zip"
          fi

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: crosspost-helper-${{ matrix.platform.artifact }}-${{ github.ref_name }}
          path: dist/release/${{ matrix.platform.artifact }}/*
          if-no-files-found: error

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/release/${{ matrix.platform.artifact }}/*
          generate_release_notes: true
          prerelease: false
          fail_on_unmatched_files: true

  notify:
    name: Notify Discord
    needs: [build, publish-itch]
    runs-on: ubuntu-22.04
    if: always() && startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Notify Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RELEASE_VERSION: ${{ github.ref_name }}
        run: node scripts/notify-discord.cjs

  publish-itch:
    name: Publish to itch.io
    needs: build
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/')
    env:
      BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
      ITCH_USERNAME: ${{ vars.ITCH_USERNAME || 'valerie-4659' }}
      ITCH_GAME_SLUG: ${{ vars.ITCH_GAME_SLUG || 'crossposthelper' }}
    steps:
      - name: Download release artifacts
        if: env.BUTLER_API_KEY != ''
        uses: actions/download-artifact@v4
        with:
          path: dist/release
          pattern: crosspost-helper-*-${{ github.ref_name }}
          merge-multiple: false

      - name: Install butler
        if: env.BUTLER_API_KEY != ''
        run: |
          curl -L -o butler.zip https://broth.itch.ovh/butler/linux-amd64/LATEST/archive/default
          unzip butler.zip -d butler
          chmod +x butler/butler
          ./butler/butler -V

      - name: Push macOS
        if: env.BUTLER_API_KEY != ''
        run: ./butler/butler push dist/release/crosspost-helper-macos-${{ github.ref_name }} "$ITCH_USERNAME/$ITCH_GAME_SLUG:macos" --userversion "${GITHUB_REF_NAME#v}"

      - name: Push Windows
        if: env.BUTLER_API_KEY != ''
        run: ./butler/butler push dist/release/crosspost-helper-windows-${{ github.ref_name }} "$ITCH_USERNAME/$ITCH_GAME_SLUG:windows" --userversion "${GITHUB_REF_NAME#v}"

      - name: Push Linux
        if: env.BUTLER_API_KEY != ''
        run: ./butler/butler push dist/release/crosspost-helper-linux-${{ github.ref_name }} "$ITCH_USERNAME/$ITCH_GAME_SLUG:linux" --userversion "${GITHUB_REF_NAME#v}"

      - name: Skip itch.io publish
        if: env.BUTLER_API_KEY == ''
        run: echo "BUTLER_API_KEY is not configured; skipping itch.io publish."
